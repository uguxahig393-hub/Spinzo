<!DOCTYPE html>
<html>
<head>
  <title>Spin & Earn</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: linear-gradient(#6a11cb, #3b0066);
      color: white;
    }

    .top {
      display: flex;
      justify-content: space-around;
      padding: 10px;
    }

    .btn {
      padding: 10px 15px;
      background: orange;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
    }

    .balance {
      font-size: 28px;
      margin-top: 10px;
    }

    .progressBox {
      width: 80%;
      margin: auto;
      background: #ccc;
      border-radius: 20px;
      margin-top: 10px;
    }

    .progress {
      height: 12px;
      width: 0%;
      background: orange;
      border-radius: 20px;
    }

    .wheelBox {
      position: relative;
      margin-top: 20px;
    }

    .wheel {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      border: 8px solid white;
      margin: auto;
      transition: transform 3s ease-out;
      background: conic-gradient(
        #ff4d4d 0deg 45deg,
        #4da6ff 45deg 90deg,
        #66ff66 90deg 135deg,
        #ffff66 135deg 180deg,
        #ff66cc 180deg 225deg,
        #ffa31a 225deg 270deg,
        #b366ff 270deg 315deg,
        #00cccc 315deg 360deg
      );
    }

    .pointer {
      width: 0;
      height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-bottom: 30px solid white;
      margin: auto;
    }

    .labels div {
      position: absolute;
      font-size: 12px;
      font-weight: bold;
      color: black;
    }

    .spinBtn {
      margin-top: 15px;
    }
  </style>
</head>

<body>

<!-- Top Buttons -->
<div class="top">
  <button class="btn">Rank</button>
  <button class="btn">Invitation</button>
  <button class="btn">Cash Out</button>
</div>

<!-- Balance -->
<div class="balance">₹<span id="bal">0</span></div>

<!-- Progress -->
<div class="progressBox">
  <div class="progress" id="progress"></div>
</div>
<p id="leftText"></p>

<!-- Pointer -->
<div class="pointer"></div>

<!-- Wheel -->
<div class="wheelBox">
  <div class="wheel" id="wheel"></div>

  <!-- Labels -->
  <div class="labels">
    <div style="top:20px; left:120px;">Mini</div>
    <div style="top:80px; right:20px;">Mega</div>
    <div style="bottom:70px; right:30px;">Double</div>
    <div style="bottom:20px; left:120px;">Mini</div>
    <div style="bottom:80px; left:20px;">Medium</div>
    <div style="top:80px; left:20px;">₹100</div>
  </div>
</div>

<!-- Buttons -->
<div class="spinBtn">
  <button class="btn" onclick="spin()">SPIN</button>
  <br><br>
  <button class="btn" onclick="refer()">Invite (Get 1 Spin)</button>
  <br><br>
  <button class="btn" onclick="withdraw()">Withdraw</button>
  <br><br>
  <button class="btn" onclick="copyLink()">Copy Invite Link</button>
</div>

<script>
let balance = 0;
let spins = 3;
let spinCount = 0;

function updateUI(){
  document.getElementById("bal").innerText = balance;

  let percent = (balance / 250) * 100;
  if(percent > 100) percent = 100;

  document.getElementById("progress").style.width = percent + "%";

  let left = 250 - balance;
  if(left < 0) left = 0;

  document.getElementById("leftText").innerText =
    "Only ₹" + left + " to cash out ₹250!";
}

function spin(){
  if(spins <= 0){
    alert("No spins left!");
    return;
  }

  spins--;
  spinCount++;

  let win = 0;

  if(spinCount === 1){
    win = 160;
  } else if(spinCount === 2){
    win = Math.floor(Math.random() * 10) + 1;
  } else if(spinCount === 3){
    win = Math.floor(Math.random() * 5) + 1;
  } else {
    win = Math.floor(Math.random() * 5) + 1;
  }

  balance += win;

  let deg = Math.floor(Math.random() * 360) + 720;
  document.getElementById("wheel").style.transform =
    "rotate(" + deg + "deg)";

  setTimeout(()=>{
    alert("You won ₹" + win);
    updateUI();
  }, 3000);
}

function refer(){
  spins++;
  alert("+1 Spin added!");
}

function withdraw(){
  if(balance >= 200){
    alert("Withdrawal Successful!");
    balance = 0;
  } else {
    alert("Minimum ₹200 required");
  }
  updateUI();
}

function copyLink(){
  let link = window.location.href;
  navigator.clipboard.writeText(link);
  alert("Link copied!");
}

updateUI();
</script>

</body>
</html>
