<!DOCTYPE html>
<html>
<head>
  <title>Spin & Earn</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(#5b0f9c, #2d014d);
      color: white;
    }

    .box {
      margin-top: 20px;
    }

    .balance {
      font-size: 30px;
      margin: 10px;
    }

    .btn {
      padding: 10px 20px;
      background: orange;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
    }

    .wheel {
      width: 250px;
      height: 250px;
      border-radius: 50%;
      border: 8px solid white;
      margin: 20px auto;
      position: relative;
      transition: transform 3s ease-out;
      background: conic-gradient(
        red 0deg 60deg,
        blue 60deg 120deg,
        green 120deg 180deg,
        yellow 180deg 240deg,
        pink 240deg 300deg,
        orange 300deg 360deg
      );
    }

    .pointer {
      width: 0;
      height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-bottom: 30px solid white;
      margin: auto;
    }
  </style>
</head>

<body>

<h2>Spin & Earn</h2>

<div class="balance">Balance: ₹<span id="bal">0</span></div>
<div>Spins Left: <span id="spins">3</span></div>

<div class="pointer"></div>
<div class="wheel" id="wheel"></div>

<button class="btn" onclick="spin()">SPIN</button>
<br><br>

<button class="btn" onclick="refer()">Invite (Get 1 Spin)</button>
<br><br>

<button class="btn" onclick="withdraw()">Withdraw</button>

<script>
let balance = 0;
let spins = 3;
let spinCount = 0;

function updateUI(){
  document.getElementById("bal").innerText = balance;
  document.getElementById("spins").innerText = spins;
}

function spin(){
  if(spins <= 0){
    alert("No spins left!");
    return;
  }

  spins--;
  spinCount++;

  let win = 0;

  if(spinCount === 1){
    win = 160;
  }
  else if(spinCount === 2){
    win = Math.floor(Math.random() * 10) + 1;
  }
  else if(spinCount === 3){
    win = Math.floor(Math.random() * 5) + 1;
  }
  else{
    win = Math.floor(Math.random() * 5) + 1;
  }

  balance += win;

  let deg = Math.floor(Math.random() * 360) + 720;
  document.getElementById("wheel").style.transform = "rotate(" + deg + "deg)";

  setTimeout(()=>{
    alert("You won ₹" + win);
    updateUI();
  }, 3000);
}

function refer(){
  spins++;
  updateUI();
  alert("Referral Success! +1 Spin");
}

function withdraw(){
  if(balance >= 200){
    alert("Withdrawal Successful!");
    balance = 0;
  } else {
    alert("Minimum ₹200 required");
  }
  updateUI();
}

updateUI();
</script>

</body>
</html>
